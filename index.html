<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaJa Ofertas</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      background: linear-gradient(135deg, #111827, #1e293b);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:30px;
      color:white;
    }

    .container{
      width:100%;
      max-width:850px;
      background: rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(12px);
      border-radius:24px;
      padding:50px;
      text-align:center;
      box-shadow:0 10px 40px rgba(0,0,0,0.35);
    }

    h1{
      font-size:48px;
      margin-bottom:20px;
    }

    p{
      font-size:18px;
      color:#d1d5db;
      line-height:1.8;
      margin-bottom:35px;
    }

    .links{
      display:flex;
      justify-content:center;
      gap:20px;
      flex-wrap:wrap;
    }

    .links a{
      text-decoration:none;
      background:#38bdf8;
      color:#0f172a;
      padding:14px 28px;
      border-radius:12px;
      font-weight:bold;
      transition:0.3s;
    }

    .links a:hover{
      transform:translateY(-3px);
      background:#7dd3fc;
    }

    .footer{
      margin-top:40px;
      color:#94a3b8;
      font-size:14px;
    }

    @media(max-width:768px){

      .container{
        padding:30px;
      }

      h1{
        font-size:34px;
      }

      p{
        font-size:16px;
      }

    }
  </style>
</head>

<body>

  <div class="container">

    <h1>MaJa Ofertas</h1>

    <p>
      Official website for TikTok API verification and affiliate marketing information.
    </p>

    <div class="links">
      <a href="terms.html">Terms of Service</a>
      <a href="privacy.html">Privacy Policy</a>
    </div>

    <div class="footer">
      © 2026 MaJa Ofertas. All rights reserved.
    </div>

  </div>

</body>
</html>
